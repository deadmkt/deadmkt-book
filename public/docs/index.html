<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadMKT — Documentation</title>
  <meta name="description" content="DeadMKT protocol documentation. Run a node, write a strategy, trade as an equal.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-background-color: #050508;
      --sidebar-background: #0a0a10;
      --sidebar-border-color: #151520;
      --sidebar-nav-link-color: #6a6a7a;
      --sidebar-nav-link-color--active: #22c55e;
      --sidebar-nav-strong-color: #d4d4dc;
      --sidebar-width: 260px;

      --content-max-width: 760px;

      --heading-color: #d4d4dc;
      --heading-h1-font-size: 28px;
      --heading-h2-font-size: 20px;
      --heading-h3-font-size: 16px;
      --heading-h1-font-weight: 700;
      --heading-h2-font-weight: 600;

      --base-color: #b0b0bc;
      --base-font-family: 'DM Sans', -apple-system, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.75;

      --code-font-family: 'JetBrains Mono', monospace;
      --code-font-size: 13px;
      --code-block-border-radius: 8px;
      --code-inline-background: #16161f;
      --code-inline-color: #22c55e;
      --code-inline-border-radius: 4px;
      --code-inline-padding: 2px 6px;
      --code-block-background: #0c0c12;

      --link-color: #6366f1;
      --link-color--hover: #818cf8;

      --blockquote-border-color: #22c55e;
      --blockquote-background: rgba(34, 197, 94, 0.04);
      --blockquote-color: #9a9aac;

      --table-head-background: #0c0c12;
      --table-head-color: #6a6a7a;
      --table-cell-border-color: #151520;

      --notice-tip-border-color: #22c55e;
      --notice-important-border-color: #eab308;

      --search-input-background-color: #0c0c12;
      --search-input-border-color: #151520;
      --search-input-color: #d4d4dc;
      --search-result-heading-color: #d4d4dc;
      --search-result-item-color: #6a6a7a;
    }

    /* Sidebar logo */
    .sidebar .app-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 24px 20px 16px;
    }

    .sidebar .app-name a {
      color: #d4d4dc !important;
      text-decoration: none;
    }

    .sidebar .app-name .logo-d {
      color: #22c55e;
    }

    /* Sidebar nav tweaks */
    .sidebar-nav li a {
      font-size: 13px;
      padding: 4px 0;
    }

    .sidebar-nav li strong {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-top: 20px;
      margin-bottom: 6px;
    }

    /* Content tweaks */
    .markdown-section h1 {
      font-family: 'DM Sans', sans-serif;
      border-bottom: 1px solid #151520;
      padding-bottom: 12px;
    }

    .markdown-section h2 {
      font-family: 'DM Sans', sans-serif;
      margin-top: 40px;
      border-bottom: none;
    }

    .markdown-section h3 {
      font-family: 'DM Sans', sans-serif;
      color: #9a9aac;
    }

    .markdown-section code {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Alpha badge in sidebar */
    .sidebar-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(34, 197, 94, 0.08);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.15);
      letter-spacing: 0.05em;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* Back to home link */
    .back-home {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3a3a4a;
      text-decoration: none;
      padding: 8px 20px;
      transition: color 0.15s;
    }

    .back-home:hover {
      color: #6a6a7a;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #151520; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<span class="logo-d">D</span>EADMKT <span class="sidebar-badge">alpha</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        paths: 'auto',
      },
      notFoundPage: true,
    }
  </script>
  <!-- Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
</body>
</html>
